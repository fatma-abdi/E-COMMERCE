<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Website</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <!-- header section-->
     <section class="bg-gray-800 text-white px-6 md:px-20 lg:px-40 py-5 flex items-center justify-between">

     <a href="#" class="text-2xl font-bold tracking-wide">
        Ecommerce Website
        </a>

        <nav class="hidden md:block">
        <ul class="flex items-center gap-6 text-lg">

      <li>
        <a href="#" class="hover:text-blue-400 transition duration-300">
          Home
        </a>
      </li>

      <li>
        <a href="#" class="hover:text-blue-400 transition duration-300">
          Shop
        </a>
      </li>

      <li>
        <a href="#" class="hover:text-blue-400 transition duration-300">
          About
        </a>
      </li>

      <li>
        <a href="#" class="hover:text-blue-400 transition duration-300">
          Contact
        </a>
      </li>

      </ul>
      </nav>

     </section>

     <!-- hero section -->
        <section class="bg-gray-100 py-20 px-6 md:px-20 lg:px-40 flex flex-col md:flex-row items-center gap-10">
        <div class="md:w-1/2">
            <h1 class="text-4xl font-bold mb-6">
           trade-in-offer
            <h1 class="text-4xl font-bold mb-6">
           super value deals <span class="text-blue-500">on all products</span>    

            </h1>
            <p class="text-lg mb-8 text-gray-700 ">
           save more with coupons $ up to 70% odd!
            </p>
            <a href="#" class="bg-blue-500 text-white px-6 py-3 rounded hover:bg-blue-600 transition duration-300">
            Shop Now
            </a>
        </div>
        <div class="md:w-1/2">
            <img src="https://i.pinimg.com/736x/70/a7/8b/70a78bede117ea76b40ac5bc83559421.jpg" alt="Ecommerce Hero Image" class="w-full rounded shadow">
        </div>
        </section>
        
        <!-- feature products -->
         <section class="px-6 md:px-20 lg:px-40 py-14 bg-gray-100">

  <div class="text-center mb-10">
    <h2 class="text-3xl font-bold text-gray-800">Featured Products</h2>
    <p class="text-gray-600 mt-2">Explore our most popular items</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">

    <!-- Product 1 -->
    <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" class="w-full h-56 object-cover" alt="">
      <div class="p-4">
        <h3 class="text-xl font-semibold">Running Shoes</h3>
        <p class="text-gray-500 mt-1">$49.99</p>
        <button class="mt-4 w-full bg-gray-800 text-white py-2 rounded-lg hover:bg-blue-600 transition">
          Add to Cart
        </button>
      </div>
    </div>

    <!-- Product 2 -->
    <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" class="w-full h-56 object-cover" alt="">
      <div class="p-4">
        <h3 class="text-xl font-semibold">Smart Watch</h3>
        <p class="text-gray-500 mt-1">$89.99</p>
        <button class="mt-4 w-full bg-gray-800 text-white py-2 rounded-lg hover:bg-blue-600 transition">
          Add to Cart
        </button>
      </div>
    </div>

    <!-- Product 3 -->
    <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f" class="w-full h-56 object-cover" alt="">
      <div class="p-4">
        <h3 class="text-xl font-semibold">Fashion Bag</h3>
        <p class="text-gray-500 mt-1">$39.99</p>
        <button class="mt-4 w-full bg-gray-800 text-white py-2 rounded-lg hover:bg-blue-600 transition">
          Add to Cart
        </button>
      </div>
    </div>

    <!-- Product 4 -->
    <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300">
      <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad" class="w-full h-56 object-cover" alt="">
      <div class="p-4">
        <h3 class="text-xl font-semibold">Headphones</h3>
        <p class="text-gray-500 mt-1">$59.99</p>
        <button class="mt-4 w-full bg-gray-800 text-white py-2 rounded-lg hover:bg-blue-600 transition">
          Add to Cart
        </button>
      </div>
    </div>

  </div>

</section>
      
</body>
</html>
